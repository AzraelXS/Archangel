name: ${COMPOSE_PROJECT_NAME:-archangel-collector}

networks:
  archangel-collector-net:
    driver: bridge

volumes:
  es-certs:
  es-data:
  redis-data:
  collector-state:

services:

  # ---------------------------------------------------------------------
  # Local Elasticsearch: durable backlog for this collector's observed
  # data (metrics/events/traps) before it's shipped to the cloud tenant.
  # ---------------------------------------------------------------------
  es-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: archangel-collector-es-setup
    volumes:
      - es-certs:/usr/share/elasticsearch/config/certs
    user: "0"
    command: >
      bash -c '
        if [ ! -f /usr/share/elasticsearch/config/certs/ca.zip ]; then
          bin/elasticsearch-certutil ca --silent --pem -out /usr/share/elasticsearch/config/certs/ca.zip;
          unzip /usr/share/elasticsearch/config/certs/ca.zip -d /usr/share/elasticsearch/config/certs;
          bin/elasticsearch-certutil cert --silent --pem -out /usr/share/elasticsearch/config/certs/certs.zip \
            --ca-cert /usr/share/elasticsearch/config/certs/ca/ca.crt \
            --ca-key /usr/share/elasticsearch/config/certs/ca/ca.key \
            --name es01 --dns es01 --dns localhost --ip 127.0.0.1;
          unzip /usr/share/elasticsearch/config/certs/certs.zip -d /usr/share/elasticsearch/config/certs;
        fi;
        chown -R 1000:0 /usr/share/elasticsearch/config/certs;
        find /usr/share/elasticsearch/config/certs -type f -name "*.crt" -exec chmod 644 {} \;
        find /usr/share/elasticsearch/config/certs -type f -name "*.key" -exec chmod 640 {} \;
      '
    networks:
      - archangel-collector-net

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: archangel-collector-es01
    restart: unless-stopped
    depends_on:
      es-setup:
        condition: service_completed_successfully
    ports:
      - "${ES_PORT}:9200"
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.license.self_generated.type=${LICENSE}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es01/es01.key
      - xpack.security.http.ssl.certificate=certs/es01/es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es01/es01.key
      - xpack.security.transport.ssl.certificate=certs/es01/es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: ${ES_MEM_LIMIT}
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - es-certs:/usr/share/elasticsearch/config/certs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt -u elastic:${ELASTIC_PASSWORD} https://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
    networks:
      - archangel-collector-net

  redis:
    image: redis:7-alpine
    container_name: archangel-collector-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    networks:
      - archangel-collector-net

  # ---------------------------------------------------------------------
  # Core: polling engine, syslog automation entry point
  # ---------------------------------------------------------------------
  core:
    build:
      context: ..
      dockerfile: collector/backend/Dockerfile
    container_name: archangel-collector-core
    command: ["python", "-m", "core.core"]
    restart: unless-stopped
    depends_on:
      es01:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - ES_HOST=https://es01:9200
      - ES_USER=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - ES_CA_CERT=/certs/ca/ca.crt
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - es-certs:/certs:ro
    networks:
      - archangel-collector-net

  celery-worker:
    build:
      context: ..
      dockerfile: collector/backend/Dockerfile
    container_name: archangel-collector-celery-worker
    command: ["celery", "-A", "core.celery_app", "worker", "--loglevel=INFO"]
    restart: unless-stopped
    depends_on:
      - redis
      - core
    environment:
      - ES_HOST=https://es01:9200
      - ES_USER=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - ES_CA_CERT=/certs/ca/ca.crt
      - REDIS_URL=redis://redis:6379/0
      - CLOUD_API_URL=${CLOUD_API_URL}
      - TENANT_API_KEY=${TENANT_API_KEY}
      - COLLECTOR_NAME=${COLLECTOR_NAME}
    volumes:
      - ./backend:/app
      - es-certs:/certs:ro
      - collector-state:/app/state
    networks:
      - archangel-collector-net

  celery-beat:
    build:
      context: ..
      dockerfile: collector/backend/Dockerfile
    container_name: archangel-collector-celery-beat
    command: ["celery", "-A", "core.celery_app", "beat", "--loglevel=INFO"]
    restart: unless-stopped
    depends_on:
      - redis
      - core
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - es-certs:/certs:ro
      - collector-state:/app/state
    networks:
      - archangel-collector-net

  # ---------------------------------------------------------------------
  # Sync agent: registers with the cloud tenant, ships local ES backlog
  # ---------------------------------------------------------------------
  sync-agent:
    build:
      context: ..
      dockerfile: collector/backend/Dockerfile
    container_name: archangel-collector-sync-agent
    command: ["python", "-m", "sync.client"]
    restart: unless-stopped
    depends_on:
      es01:
        condition: service_healthy
    environment:
      - ES_HOST=https://es01:9200
      - ES_USER=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - ES_CA_CERT=/certs/ca/ca.crt
      - CLOUD_API_URL=${CLOUD_API_URL}
      - TENANT_API_KEY=${TENANT_API_KEY}
      - COLLECTOR_NAME=${COLLECTOR_NAME}
    volumes:
      - ./backend:/app
      - es-certs:/certs:ro
      - collector-state:/app/state
    networks:
      - archangel-collector-net

  snmp-trap-listener:
    build:
      context: ..
      dockerfile: collector/backend/Dockerfile
    container_name: archangel-collector-snmp-trap-listener
    command: ["python", "-m", "listeners.snmp_trap_listener"]
    restart: unless-stopped
    ports:
      - "${SNMP_TRAP_PORT}:1162/udp"
    environment:
      - SYSLOG_FORWARD_HOST=core
      - SYSLOG_FORWARD_PORT=${SYSLOG_UDP_PORT}
    volumes:
      - ./backend:/app
    networks:
      - archangel-collector-net

  smtp-listener:
    build:
      context: ..
      dockerfile: collector/backend/Dockerfile
    container_name: archangel-collector-smtp-listener
    command: ["python", "-m", "listeners.smtp_listener"]
    restart: unless-stopped
    ports:
      - "${SMTP_LISTEN_PORT}:1025"
    environment:
      - SYSLOG_FORWARD_HOST=core
      - SYSLOG_FORWARD_PORT=${SYSLOG_UDP_PORT}
    volumes:
      - ./backend:/app
    networks:
      - archangel-collector-net
